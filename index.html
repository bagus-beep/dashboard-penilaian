<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Monitoring Kelas Informatika</title>

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238b5cf6' rx='20' width='100' height='100'/><text y='.9em' font-size='80' x='10'>🎓</text></svg>" type="image/svg+xml" />

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class'
  }
</script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"/>

<!-- Custom Styles -->
<link rel="stylesheet" href="css/styles.css" />
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900">

<!-- ================= NAVBAR ================= -->
<header class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-700/50 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
    
    <!-- Logo & Title -->
    <div class="flex items-center gap-3">
      <div class="relative">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 via-purple-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-purple-500/25">
          <i class="fas fa-graduation-cap text-white text-xl"></i>
        </div>
        <div class="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full border-2 border-white dark:border-slate-800"></div>
      </div>
      <div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-violet-600 to-indigo-600 bg-clip-text text-transparent dark:from-violet-400 dark:to-indigo-400">
          Dashboard Monitoring
        </h1>
        <p class="text-xs text-slate-500 dark:text-slate-300 font-medium">
          <i class="fas fa-school mr-1 dark:text-slate-300"></i>Kelas Informatika
        </p>
      </div>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-3">
      <!-- Theme Toggle -->
      <button id="themeToggle" class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 dark:from-amber-500 dark:to-orange-600 flex items-center justify-center shadow-lg dark:shadow-orange-500/20 hover:scale-105 active:scale-95 transition-all">
        <i class="fas fa-moon text-white dark:hidden"></i>
        <i class="fas fa-sun text-white hidden dark:block"></i>
      </button>
    </div>
  </div>
</header>

<!-- ================= MAIN APP CONTAINER ================= -->
<main
  id="app"
  data-page="dashboard"
  class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8"
>
  <!-- Content will be loaded dynamically -->
  <div id="app-content" class="space-y-6 sm:space-y-8">
    <!-- Loading State -->
    <div class="flex items-center justify-center min-h-[400px]">
      <div class="text-center">
        <div class="loading-spinner mx-auto mb-4"></div>
        <p class="text-slate-500 dark:text-slate-400">Memuat halaman...</p>
      </div>
    </div>
  </div>
</main>

<!-- ================= SCRIPTS ================= -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- App Scripts -->
<script type="module" src="js/app.js"></script>

</body>
</html>
